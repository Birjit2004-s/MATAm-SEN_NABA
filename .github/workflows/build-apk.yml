name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Set up Gradle 8.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'

      - name: Restore cached debug keystore
        id: keystore-cache
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: debug-keystore-stable-v1

      - name: Generate debug keystore (first run only)
        if: steps.keystore-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.android
          $JAVA_HOME/bin/keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build debug APK
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle assembleDebug --no-daemon

      - name: Print SHA-1 fingerprint (keystore + APK certificate)
        run: |
          echo "=== KEYSTORE SHA-1 (what you registered in Firebase) ==="
          $JAVA_HOME/bin/keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android -keypass android \
            | grep "SHA1:"
          echo "=== APK CERTIFICATE SHA-1 (what is actually inside the APK) ==="
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --print-certs \
            app/build/outputs/apk/debug/app-debug.apk \
            | grep "SHA-1"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: matam-sen-naba-apk
          path: app/build/outputs/apk/debug/app-debug.apk
