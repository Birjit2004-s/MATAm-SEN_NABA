name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Set up Gradle 8.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'

      - name: Build debug APK
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle assembleDebug --no-daemon

      - name: Print SHA-1 fingerprint (add this to Firebase project settings)
        continue-on-error: true
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            echo "debug.keystore not found — generating one..."
            $JAVA_HOME/bin/keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
          echo "=== SHA-1 fingerprint (add to Firebase project settings) ==="
          $JAVA_HOME/bin/keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android -keypass android \
            | grep "SHA1:"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: matam-sen-naba-apk
          path: app/build/outputs/apk/debug/app-debug.apk
